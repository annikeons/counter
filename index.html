<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>wait</title>
<link rel="shortcut icon" href="laicon.jpg" type="image/x-icon">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
text-align:center;
overflow:hidden;

background:
radial-gradient(circle at 15% 20%, #dff8d8 0%, transparent 35%),
radial-gradient(circle at 80% 25%, #d7f4ff 0%, transparent 35%),
radial-gradient(circle at 50% 80%, #edfbdc 0%, transparent 40%),
linear-gradient(-45deg,#d4efc7,#dffaf3,#d7ecff,#f7fff2);

background-size:400% 400%;
animation:gradient 18s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glows */
body::before{
content:"";
position:absolute;
width:420px;
height:420px;
background:#bfeeb8;
filter:blur(150px);
opacity:.45;
top:10%;
left:10%;
z-index:0;
}

body::after{
content:"";
position:absolute;
width:420px;
height:420px;
background:#c7ecff;
filter:blur(150px);
opacity:.45;
bottom:10%;
right:10%;
z-index:0;
}

/* CARD */
.container{
position:relative;
z-index:1;

width:min(92vw,760px);

background:rgba(255,255,255,.24);

padding:70px 55px;
border-radius:42px;

backdrop-filter:blur(35px);
-webkit-backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.65);

box-shadow:
0 30px 80px rgba(90,140,90,.15),
0 0 35px rgba(190,255,220,.4),
0 0 70px rgba(220,245,255,.25),
inset 0 1px 4px rgba(255,255,255,.8);

animation:floatCard 5s ease-in-out infinite;
transition:.6s;
}

.container:hover{
transform:scale(1.03);
}

@keyframes floatCard{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
font-size:clamp(1.8rem,5vw,2.45rem);
line-height:1.45;
margin-bottom:25px;
color:#8ec88f;

text-shadow:
0 0 10px rgba(170,255,170,.55),
0 0 20px rgba(145,235,255,.35),
0 0 30px rgba(255,255,255,.35);
}

#countdown{
font-size:clamp(2rem,7vw,3.2rem);
font-weight:800;
line-height:1.4;
letter-spacing:2px;
color:#72acd8;

text-shadow:
0 0 12px rgba(91,155,213,.7),
0 0 25px rgba(170,230,255,.5);
}

.unit{
display:inline-block;
margin-right:8px;
}

small{
display:block;
margin-top:18px;
font-size:clamp(.9rem,2vw,1rem);
color:#5c7461;
}

/* sparkles */
.sparkle{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;

box-shadow:
0 0 12px white,
0 0 22px rgba(255,255,255,.8);

animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{
opacity:.3;
transform:scale(.7);
}
to{
opacity:1;
transform:scale(1.4);
}
}

/* sapitos */
.particle{
position:absolute;
font-size:30px;
opacity:.95;
cursor:pointer;
user-select:none;
touch-action:manipulation;

filter:drop-shadow(0 0 10px rgba(255,255,255,.4));

animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-28px);
}
}

/* confetti */
.confetti{
position:absolute;
font-size:18px;
opacity:.95;
animation:fall 3s linear forwards;
}

@keyframes fall{
from{
transform:translateY(-10vh) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(360deg);
}
}

.fade-out{
transform:scale(1.08);
opacity:0;
}

/* responsive */
@media(max-width:768px){

.container{
padding:55px 28px;
border-radius:32px;
}

.particle{
font-size:24px;
}

body::before,
body::after{
width:300px;
height:300px;
}

}

@media(max-width:480px){

.container{
padding:42px 22px;
}

.particle{
font-size:20px;
}

.sparkle{
width:6px;
height:6px;
}

.unit{
margin-right:4px;
}

}

</style>
</head>
<body>


<div class="container" id="card">

<h1>
Obra en construcción <br>
Patos trabajando 🏗️
</h1>

<div id="countdown"></div>

<small>Hasta el 29 de abril a las 12:00 AM</small>

</div>


<script>

const targetDate=
new Date(2026,3,29,0,0,0).getTime();

const countdownElement=
document.getElementById("countdown");

const card=
document.getElementById("card");


/* sparkles */
function createSparkles(){
for(let i=0;i<50;i++){
const s=document.createElement("div");
s.classList.add("sparkle");

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);
}
}
createSparkles();



/* sapos y patos interactivos */
const particles=[];

function createParticles(){

const shapes=["🐸","🦆"];

for(let i=0;i<30;i++){

const p=document.createElement("div");
p.classList.add("particle");

p.innerHTML=
shapes[Math.floor(Math.random()*shapes.length)];

randomPosition(p);

/* desktop */
p.addEventListener(
"mouseenter",
()=>moveParticle(p)
);

/* click */
p.addEventListener(
"click",
()=>moveParticle(p)
);

/* mobile tap */
p.addEventListener(
"touchstart",
function(e){
e.preventDefault();
moveParticle(p);
}
);

document.body.appendChild(p);
particles.push(p);

}

}

function randomPosition(p){
p.style.left=
Math.random()*
(window.innerWidth-60)+"px";

p.style.top=
Math.random()*
(window.innerHeight-60)+"px";
}

function moveParticle(p){

const x=
Math.random()*
(window.innerWidth-80);

const y=
Math.random()*
(window.innerHeight-80);

p.style.transition=
"all .55s ease";

p.style.left=x+"px";
p.style.top=y+"px";
}

createParticles();


/* si cambia tamaño pantalla recoloca */
window.addEventListener("resize",()=>{
particles.forEach(p=>{
randomPosition(p);
});
});


/* luciernagas */
setInterval(()=>{

const glow=document.createElement("div");

glow.style.position="absolute";
glow.style.width="10px";
glow.style.height="10px";
glow.style.borderRadius="50%";
glow.style.background="#fffccf";
glow.style.boxShadow="0 0 20px #fffccf";

glow.style.left=
Math.random()*100+"vw";

glow.style.top="100vh";

glow.style.transition="5s linear";

document.body.appendChild(glow);

setTimeout(()=>{
glow.style.transform=
"translateY(-120vh)";
glow.style.opacity="0";
},50);

setTimeout(()=>{
glow.remove();
},5000);

},800);



function createConfetti(){

const hearts=["♡","✧","✿","❀"];

for(let i=0;i<80;i++){

const c=document.createElement("div");

c.classList.add("confetti");

c.innerHTML=
hearts[Math.floor(Math.random()*hearts.length)];

c.style.left=
Math.random()*100+"vw";

c.style.fontSize=
(14+Math.random()*18)+"px";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},3000);

}
}



/* countdown */
const countdown=
setInterval(function(){

const now=
new Date().getTime();

const distance=
targetDate-now;

if(distance<=0){

clearInterval(countdown);

createConfetti();

card.classList.add("fade-out");

setTimeout(()=>{
window.location.href=
"https://canva.link/cucuyoyo";
},1500);

return;
}

const days=Math.floor(distance/(1000*60*60*24));

const hours=Math.floor(
(distance%(1000*60*60*24))/(1000*60*60)
);

const minutes=Math.floor(
(distance%(1000*60*60))/(1000*60)
);

const seconds=Math.floor(
(distance%(1000*60))/1000
);

countdownElement.innerHTML=
`<span class="unit">${days}d</span>
<span class="unit">${hours}h</span>
<span class="unit">${minutes}m</span>
<span class="unit">${seconds}s</span>`;

},1000);

</script>

</body>
</html>
